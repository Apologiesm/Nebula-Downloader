name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: NebulaDownloaderPro-Windows
            extension: .exe
            separator: ';'
          - os: ubuntu-latest
            artifact_name: NebulaDownloaderPro-Linux
            extension: ''
            separator: ':'
          - os: macos-latest
            artifact_name: NebulaDownloaderPro-macOS
            extension: ''
            separator: ':'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p ffmpeg/bin
          sudo apt-get update && sudo apt-get install -y ffmpeg
          cp /usr/bin/ffmpeg ffmpeg/bin/ffmpeg

      - name: Install FFmpeg (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p ffmpeg/bin
          brew install ffmpeg
          cp $(brew --prefix)/bin/ffmpeg ffmpeg/bin/ffmpeg

      - name: Install FFmpeg (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "ffmpeg/bin"
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
          7z x ffmpeg.zip
          Copy-Item "ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe" -Destination "ffmpeg/bin/ffmpeg.exe"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed --add-data "ffmpeg${{ matrix.separator }}ffmpeg" --name "${{ matrix.artifact_name }}" main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}${{ matrix.extension }}

  create-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
